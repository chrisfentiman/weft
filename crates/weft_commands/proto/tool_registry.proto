syntax = "proto3";

package weft.tool_registry.v1;

service ToolRegistry {
  // List all tools available in this registry.
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);

  // Get the full description and parameter schema for a tool.
  rpc DescribeTool(DescribeToolRequest) returns (DescribeToolResponse);

  // Execute a tool with the given arguments.
  rpc ExecuteTool(ExecuteToolRequest) returns (ExecuteToolResponse);
}

message ListToolsRequest {}

message ListToolsResponse {
  repeated ToolInfo tools = 1;
}

message ToolInfo {
  // Unique tool name within this registry.
  string name = 1;
  // One-line description for context injection.
  string description = 2;
}

message DescribeToolRequest {
  string name = 1;
}

message DescribeToolResponse {
  string name = 1;
  string description = 2;
  // Detailed usage instructions.
  string usage = 3;
  // JSON schema for the tool's parameters. Empty string if none.
  string parameters_schema = 4;
}

message ExecuteToolRequest {
  string name = 1;
  // JSON-encoded arguments.
  string arguments_json = 2;
}

message ExecuteToolResponse {
  bool success = 1;
  // Result content (text).
  string output = 2;
  // Error message if success is false.
  string error = 3;
}
