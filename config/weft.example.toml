# config/weft.example.toml
#
# Weft gateway configuration — router-only format.
# The [llm] and [classifier] sections from previous versions are removed.
# All LLM provider and routing configuration is now under [router].

[server]
# Address and port to listen on.
bind_address = "0.0.0.0:8080"

[gateway]
# System prompt prepended to every conversation.
system_prompt = """
You are a helpful assistant with access to tools.
Use the available commands when they would help answer the user's question.
Be concise and accurate.
"""
# Maximum number of command execution iterations per request.
max_command_iterations = 10
# Overall request timeout in seconds (covers all LLM calls and command executions).
request_timeout_secs = 300

# ── Router Configuration ───────────────────────────────────────────────────
#
# The [router] section replaces the old [llm] and [classifier] sections.
# It contains:
#   - classifier: ONNX bi-encoder for semantic routing
#   - providers: LLM API endpoints (each with nested models)
#   - default_model: routing name of the default model (fallback)
#   - skip_tools_when_unnecessary: skip command injection when router decides tools aren't needed
#   - domains: per-domain threshold and enablement overrides

[router]
# Name of the default model. Must match a model name from one of the providers.
# If absent, the first model of the first provider is used as default.
default_model = "main"

# Whether to skip command injection when the router determines tools aren't needed.
# Default: true. Set to false to always inject commands.
skip_tools_when_unnecessary = true

[router.classifier]
# Path to the ONNX bi-encoder model file.
model_path = "models/modernbert-classifier.onnx"
# Path to the HuggingFace tokenizer.json file.
tokenizer_path = "models/tokenizer.json"
# Relevance score threshold for command selection (0.0–1.0).
# Commands scoring below this threshold are excluded from the context.
threshold = 0.3
# Maximum number of commands to include regardless of threshold.
max_commands = 20

# ── Single-Provider Example ────────────────────────────────────────────────
#
# Minimal configuration: one Anthropic provider, one model.
#
# [[router.providers]] defines a provider (an API endpoint).
# [[router.providers.models]] defines models nested under a provider.
# One provider can serve many models — they all share the same api_key and base_url.

[[router.providers]]
# Unique name for this provider (used in logging).
name = "anthropic"
# Wire format: "anthropic", "openai", or "custom"
# - "anthropic": Anthropic Messages API (claude-* models)
# - "openai": OpenAI Chat Completions API (OpenAI, Ollama, vLLM, and OpenAI-compatible providers)
# - "custom": Rhai script defines the wire protocol (requires wire_script field)
wire_format = "anthropic"
# API key. Use "env:VAR_NAME" to load from an environment variable.
api_key = "env:ANTHROPIC_API_KEY"
# base_url is optional — defaults to the official Anthropic API endpoint.
# base_url = "https://api.anthropic.com/v1/messages"

  [[router.providers.models]]
  # Unique routing name for this model (used to select the model at request time).
  # Must be globally unique across all providers.
  name = "main"
  # Model identifier sent to the provider API.
  model = "claude-sonnet-4-20250514"
  # Maximum tokens in the response.
  max_tokens = 4096
  # Capabilities this model supports. Default: ["chat_completions"].
  # Omit this field for standard chat models — the default covers the common case.
  # capabilities = ["chat_completions", "vision", "tool_calling"]
  # Example queries this model is best suited for.
  # The router embeds all examples, averages them into a centroid vector,
  # and routes requests based on semantic similarity to the centroid.
  # Use at least 3 examples for a meaningful centroid.
  examples = [
    "Explain how async/await works in Rust",
    "What is the capital of France?",
    "Help me debug this error",
    "Write a function that sorts a list",
  ]

# ── Optional: Tool Registry ────────────────────────────────────────────────
#
# Remove or comment out this section if you are not using a tool registry.

[tool_registry]
# gRPC endpoint for the tool registry service.
endpoint = "http://localhost:50051"
# Connection timeout in milliseconds.
connect_timeout_ms = 5000
# Per-request timeout in milliseconds.
request_timeout_ms = 30000

# ── Optional: Memory Stores ───────────────────────────────────────────────
#
# Memory stores give the LLM the ability to recall context from previous
# conversations and remember important information for future use.
#
# Multiple stores can be configured — each handles a different semantic domain.
# The semantic router selects which store(s) to use for each /recall and /remember
# command based on the content of the query or memory being stored.
#
# The `examples` field determines which queries route to this store. The router
# computes a centroid embedding from the examples; at runtime, it scores
# the query/content against each store's centroid to pick the best match.
# Use at least 3 examples per store for a meaningful centroid.
#
# The `capabilities` field controls which operations the gateway routes to this
# store. A read-only knowledge base, a write-only audit log, or a full read-write
# conversation store are all the same gRPC service — capabilities declare how each
# store participates in this deployment. Defaults to ["read", "write"] if omitted.

[[memory.stores]]
# Unique name for this store (used in routing and logging).
name = "conversations"
# gRPC endpoint for the MemoryStore service.
endpoint = "http://localhost:50052"
# Maximum memories to retrieve per /recall query. Default: 5.
max_results = 5
# Connection timeout in milliseconds. Default: 5000.
connect_timeout_ms = 5000
# Whether this store supports reading, writing, or both. Default: ["read", "write"].
capabilities = ["read", "write"]
# Example queries this store is best suited for.
# The router uses these to build a centroid — more/better examples = better routing.
examples = [
  "What did we discuss yesterday?",
  "Recall our previous conversation about auth",
  "What was the conclusion on the database migration?",
]

# A second store — read-only knowledge base.
# The router routes recall queries about code/architecture here,
# but never writes to it (read-only replica or static knowledge base).
[[memory.stores]]
name = "code_knowledge"
endpoint = "http://localhost:50053"
max_results = 3
capabilities = ["read"]  # read-only: knowledge base, not for storing new memories
examples = [
  "How does the parser work?",
  "What's the architecture of the gateway?",
  "Explain the routing domain design",
]

